<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BarOrder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- ── PANTALLA: Cargando ────────────────────────────────────── -->
  <div id="screen-loading" class="screen active">
    <div class="spinner" style="margin: auto; flex: 1;"></div>
  </div>

  <!-- ── PANTALLA: Nombre (unirse) ─────────────────────────────── -->
  <div id="screen-join" class="screen">
    <div class="welcome-container">
      <div class="welcome-logo">🍸</div>
      <div class="welcome-title">BarOrder</div>
      <p class="welcome-sub" id="join-mesa-text">Cargando mesa...</p>

      <div class="field-group">
        <label class="field-label" for="input-nombre">Tu nombre</label>
        <input type="text" id="input-nombre" placeholder="¿Cómo te llamas?" maxlength="30"
          autocomplete="given-name" />
      </div>

      <button class="btn-primary" id="btn-join">Entrar a la mesa →</button>
    </div>
  </div>

  <!-- ── PANTALLA: Pidiendo bebidas ────────────────────────────── -->
  <div id="screen-order" class="screen">
    <div class="top-bar">
      <div class="logo-title"><span>🍸</span><h1>BarOrder</h1></div>
      <div class="mesa-badge" id="order-mesa-code">—</div>
    </div>

    <div class="category-scroll" id="cat-filter"></div>
    <div class="drinks-grid" id="drinks-grid"></div>

    <div class="fab-area">
      <button class="btn-primary" id="btn-confirmar">✓  Confirmar pedido</button>
    </div>
  </div>

  <!-- ── PANTALLA: Pedido confirmado ───────────────────────────── -->
  <div id="screen-confirmed" class="screen">
    <div class="top-bar">
      <div class="logo-title"><span>🍸</span><h1>BarOrder</h1></div>
      <div class="mesa-badge" id="conf-mesa-code">—</div>
    </div>

    <div class="confirmed-banner">
      <div class="check-icon">✅</div>
      <h2>Tu pedido está enviado</h2>
      <p id="conf-user-name">Esperando al camarero...</p>
    </div>

    <div class="confirmed-drinks" id="confirmed-drinks-list"></div>

    <div class="fab-area">
      <button class="btn-secondary" id="btn-modificar">✏️  Modificar pedido</button>
      <button class="btn-danger"    id="btn-borrar">🗑  Borrar mi pedido</button>
    </div>
  </div>

  <!-- ── PANTALLA: Vista de reparto ────────────────────────────── -->
  <div id="screen-reparto" class="screen">
    <div class="reparto-container">
      <div class="reparto-header">
        <div class="reparto-emoji">🍻</div>
        <div class="reparto-title">¡La orden está en camino!</div>
        <p class="reparto-sub">Ayuda a repartir cuando llegue</p>
      </div>
      <div id="reparto-lines"></div>
    </div>
  </div>

  <!-- ── PANTALLA: Mesa cerrada ────────────────────────────────── -->
  <div id="screen-closed" class="screen">
    <div class="closed-screen">
      <div class="closed-emoji">🔒</div>
      <div class="closed-title">Mesa cerrada</div>
      <p class="closed-sub">El admin ha cerrado esta mesa. ¡Hasta la próxima! 🍻</p>
    </div>
  </div>

</div><!-- .app -->

<!-- Supabase desde CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
